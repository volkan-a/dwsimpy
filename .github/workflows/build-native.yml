name: Build Native Libraries

on:
  workflow_dispatch:  # Manuel tetikleme
  push:
    tags:
      - 'v*'           # Version tag ile tetikleme

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Linux x86_64: CoolProp + PetAz + SkiaSharp
  # ═══════════════════════════════════════════════════════════════
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gfortran swig git python3

      - name: Build CoolProp
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git coolprop_src
          mkdir -p coolprop_src/build && cd coolprop_src/build
          cmake .. \
            -DCOOLPROP_SHARED_LIBRARY=ON \
            -DCOOLPROP_CSHARP_MODULE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-fPIC" \
            -DCMAKE_CXX_FLAGS="-fPIC"
          make -j$(nproc)
          cp libCoolProp.so $GITHUB_WORKSPACE/artifacts/

      - name: Build PetAz
        run: |
          gcc -shared -fPIC -O2 -o libPetAz.so native_libs_arm64/PetAz.c

      - name: Get SkiaSharp native
        run: |
          dotnet new classlib -o /tmp/skia && cd /tmp/skia
          dotnet add package SkiaSharp.NativeAssets.Linux --version 2.88.9
          dotnet restore
          cp ~/.nuget/packages/skiasharp.nativeassets.linux/2.88.9/runtimes/linux-x64/native/libSkiaSharp.so $GITHUB_WORKSPACE/artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x86_64
          path: artifacts/*

  # ═══════════════════════════════════════════════════════════════
  # Windows x86_64: CoolProp + PetAz + SkiaSharp
  # ═══════════════════════════════════════════════════════════════
  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-cmake mingw-w64-x86_64-gcc mingw-w64-x86_64-swig git

      - name: Build CoolProp
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git coolprop_src
          mkdir -p coolprop_src/build && cd coolprop_src/build
          cmake -G "MinGW Makefiles" .. \
            -DCOOLPROP_SHARED_LIBRARY=ON \
            -DCOOLPROP_CSHARP_MODULE=ON \
            -DCMAKE_BUILD_TYPE=Release
          mingw32-make -j$(nproc)
          cp libCoolProp.dll /c/artifacts/CoolProp.dll
          mkdir -p /c/artifacts

      - name: Build PetAz
        shell: msys2 {0}
        run: |
          gcc -shared -O2 -o PetAz.dll native_libs_arm64/PetAz.c
          cp PetAz.dll /c/artifacts/

      - name: Get SkiaSharp native
        run: |
          dotnet new classlib -o /tmp/skia && cd /tmp/skia
          dotnet add package SkiaSharp.NativeAssets.Win32 --version 2.88.9
          dotnet restore
          copy "%USERPROFILE%\.nuget\packages\skiasharp.nativeassets.win32\2.88.9\runtimes\win-x64\native\libSkiaSharp.dll" "C:\artifacts\"
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x86_64
          path: C:\artifacts\*

  # ═══════════════════════════════════════════════════════════════
  # macOS ARM64: Mevcut build'i teyit et (opsiyonel)
  # ═══════════════════════════════════════════════════════════════
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake swig

      - name: Build CoolProp
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git coolprop_src
          # FindCsharp stub
          cat > coolprop_src/cmake/FindCsharp.cmake << 'EOF'
          set(CSHARP_FOUND TRUE)
          set(CSHARP_COMPILER "")
          EOF
          cp coolprop_src/cmake/FindCsharp.cmake coolprop_src/dev/cmake/Modules/FindCsharp.cmake
          mkdir -p coolprop_src/build && cd coolprop_src/build
          cmake .. \
            -DCOOLPROP_SHARED_LIBRARY=ON \
            -DCOOLPROP_CSHARP_MODULE=ON \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)
          cp libCoolProp.dylib $GITHUB_WORKSPACE/artifacts/

      - name: Build PetAz
        run: |
          gcc -shared -dynamiclib -O2 -o libPetAz.dylib native_libs_arm64/PetAz.c

      - name: Get SkiaSharp native
        run: |
          dotnet new classlib -o /tmp/skia && cd /tmp/skia
          dotnet add package SkiaSharp.NativeAssets.macOS --version 2.88.9
          dotnet restore
          # Extract arm64 slice
          cp ~/.nuget/packages/skiasharp.nativeassets.macos/2.88.9/runtimes/osx/native/libSkiaSharp.dylib /tmp/skiasharp_universal.dylib
          lipo /tmp/skiasharp_universal.dylib -thin arm64 -output libSkiaSharp.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: |
            libCoolProp.dylib
            libPetAz.dylib
            libSkiaSharp.dylib
