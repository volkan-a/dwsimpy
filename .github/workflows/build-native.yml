name: Build Native Libraries

on:
  workflow_dispatch:

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake swig git python3
      - name: Build CoolProp
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git /tmp/cp
          printf 'set(CSHARP_FOUND TRUE)\nset(CSHARP_COMPILER "")\n' > /tmp/cp/dev/cmake/Modules/FindCsharp.cmake
          cp /tmp/cp/dev/cmake/Modules/FindCsharp.cmake /tmp/cp/cmake/FindCsharp.cmake
          mkdir /tmp/cp/build && cd /tmp/cp/build
          cmake .. -DCOOLPROP_CSHARP_MODULE=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC"
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp CoolPropCsharp.so $GITHUB_WORKSPACE/artifacts/libCoolProp.so 2>/dev/null || cp libCoolProp*.so $GITHUB_WORKSPACE/artifacts/libCoolProp.so
      - name: Build PetAz
        run: gcc -shared -fPIC -O2 -o artifacts/libPetAz.so native_libs_arm64/PetAz.c -lm
      - name: Get SkiaSharp
        run: |
          dotnet new classlib -o /tmp/s --force
          dotnet add /tmp/s package SkiaSharp.NativeAssets.Linux --version 2.88.9
          dotnet restore /tmp/s
          cp ~/.nuget/packages/skiasharp.nativeassets.linux/2.88.9/runtimes/linux-x64/native/libSkiaSharp.so artifacts/
      - uses: actions/upload-artifact@v4
        with: { name: native-linux-x86_64, path: artifacts/* }

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SWIG
        run: choco install swig -y --no-progress
      - name: Build CoolProp
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git C:\cp
          @"
          set(CSHARP_FOUND TRUE)
          set(CSHARP_COMPILER "")
          "@ | Set-Content C:\cp\dev\cmake\Modules\FindCsharp.cmake
          Copy-Item C:\cp\dev\cmake\Modules\FindCsharp.cmake C:\cp\cmake\FindCsharp.cmake
          New-Item -ItemType Directory -Force -Path C:\cp\build
          Set-Location C:\cp\build
          cmake -G "Visual Studio 17 2022" -A x64 .. -DCOOLPROP_CSHARP_MODULE=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build . --config Release --parallel
          New-Item -ItemType Directory -Force -Path C:\artifacts
          Get-ChildItem -Recurse -Filter "CoolPropCsharp.dll" | Copy-Item -Destination C:\artifacts\CoolProp.dll -Force
      - name: Build PetAz
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /LD /O2 native_libs_arm64\PetAz.c /Fe:C:\artifacts\PetAz.dll
      - name: Get SkiaSharp
        shell: pwsh
        run: |
          dotnet new classlib -o C:\s --force
          dotnet add C:\s package SkiaSharp.NativeAssets.Win32 --version 2.88.9
          dotnet restore C:\s
          Copy-Item "$env:USERPROFILE\.nuget\packages\skiasharp.nativeassets.win32\2.88.9\runtimes\win-x64\native\libSkiaSharp.dll" "C:\artifacts\"
      - uses: actions/upload-artifact@v4
        with: { name: native-windows-x86_64, path: C:\artifacts\* }

  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install cmake swig
      - name: Build CoolProp
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git /tmp/cp
          printf 'set(CSHARP_FOUND TRUE)\nset(CSHARP_COMPILER "")\n' > /tmp/cp/dev/cmake/Modules/FindCsharp.cmake
          cp /tmp/cp/dev/cmake/Modules/FindCsharp.cmake /tmp/cp/cmake/FindCsharp.cmake
          mkdir /tmp/cp/build && cd /tmp/cp/build
          cmake .. -DCOOLPROP_CSHARP_MODULE=ON -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp libCoolProp*.dylib $GITHUB_WORKSPACE/artifacts/libCoolProp.dylib 2>/dev/null || cp CoolPropCsharp.dylib $GITHUB_WORKSPACE/artifacts/libCoolProp.dylib
      - name: Build PetAz
        run: gcc -shared -dynamiclib -O2 -o artifacts/libPetAz.dylib native_libs_arm64/PetAz.c -lm
      - name: Get SkiaSharp
        run: |
          dotnet new classlib -o /tmp/s --force
          dotnet add /tmp/s package SkiaSharp.NativeAssets.macOS --version 2.88.9
          dotnet restore /tmp/s
          lipo ~/.nuget/packages/skiasharp.nativeassets.macos/2.88.9/runtimes/osx/native/libSkiaSharp.dylib -thin arm64 -output artifacts/libSkiaSharp.dylib
      - uses: actions/upload-artifact@v4
        with: { name: native-macos-arm64, path: artifacts/* }
