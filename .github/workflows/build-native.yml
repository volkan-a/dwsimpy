name: Build Native Libraries and Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  managed-runtime-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - name: Audit managed runtime payload
        run: python3 dwsimpy_package/scripts/audit_managed_runtime.py

  net10-runtime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "10.0.x" }
      - name: Build pure .NET 10 interface contracts
        run: dotnet build src/DWSIM.Interfaces/DWSIM.Interfaces.vbproj -c Release
      - name: Build pure .NET 10 global settings
        run: dotnet build src/DWSIM.GlobalSettings/DWSIM.GlobalSettings.vbproj -c Release
      - name: Build pure .NET 10 shared CSharp classes
        run: dotnet build src/DWSIM.SharedClassesCSharp/DWSIM.SharedClassesCSharp.csproj -c Release
      - name: Build pure .NET 10 runtime slice
        run: dotnet build src/DwsimPy.Runtime.Cli/DwsimPy.Runtime.Cli.csproj -c Release
      - name: Test pure .NET 10 runtime slice
        run: dotnet run --project src/DwsimPy.Runtime.Tests/DwsimPy.Runtime.Tests.csproj -c Release
      - name: Build pure .NET 10 MathOps assemblies
        run: |
          dotnet build src/DWSIM.MathOps/DWSIM.MathOps.vbproj -c Release
          dotnet build src/DWSIM.MathOps.SimpsonIntegrator/DWSIM.MathOps.SimpsonIntegrator.csproj -c Release
          dotnet build src/DWSIM.MathOps.Mapack/DWSIM.MathOps.Mapack.csproj -c Release
          dotnet build src/DWSIM.MathOps.RandomOps/DWSIM.MathOps.RandomOps.csproj -c Release
          dotnet build src/DWSIM.MathOps.SwarmOps/DWSIM.MathOps.SwarmOps.csproj -c Release
          dotnet build src/DWSIM.MathOps.DotNumerics/DWSIM.MathOps.DotNumerics.csproj -c Release
      - name: Test pure .NET 10 MathOps assemblies
        run: dotnet run --project src/DwsimPy.MathOps.Tests/DwsimPy.MathOps.Tests.csproj -c Release

  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "10.0.x" }
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake swig git python3
      - name: Install Python build tools
        run: python3 -m pip install --upgrade pip cibuildwheel
      - name: Build CoolProp and PetAz
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/io" quay.io/pypa/manylinux2014_x86_64:2025.04.19-1 /bin/bash -lc '
            set -eux
            if ! command -v 7z >/dev/null 2>&1; then
              printf "#!/bin/sh\nexit 0\n" > /usr/local/bin/7z
              chmod +x /usr/local/bin/7z
            fi
            /opt/python/cp310-cp310/bin/python -m pip install --upgrade cmake swig
            export PATH="/opt/python/cp310-cp310/bin:$PATH"
            git clone --depth 1 https://github.com/CoolProp/CoolProp.git /tmp/cp
            printf "set(Csharp_FOUND TRUE)\nset(CSHARP_FOUND TRUE)\nset(CSHARP_COMPILER \"\")\n" > /tmp/cp/dev/cmake/Modules/FindCsharp.cmake
            cp /tmp/cp/dev/cmake/Modules/FindCsharp.cmake /tmp/cp/cmake/FindCsharp.cmake
            mkdir /tmp/cp/build && cd /tmp/cp/build
            cmake .. -DCOOLPROP_CSHARP_MODULE=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC"
            make -j"$(nproc)"
            mkdir -p /io/artifacts
            cp CoolPropCsharp.so /io/artifacts/libCoolProp.so 2>/dev/null || cp libCoolProp*.so /io/artifacts/libCoolProp.so
            gcc -shared -fPIC -O2 -o /io/artifacts/libPetAz.so /io/native_libs_arm64/PetAz.c -lm
            chmod -R a+rwX /io/artifacts
          '
      - name: Get SkiaSharp
        run: |
          dotnet new classlib -o /tmp/s --force
          dotnet add /tmp/s package SkiaSharp.NativeAssets.Linux --version 2.88.9
          dotnet restore /tmp/s
          cp ~/.nuget/packages/skiasharp.nativeassets.linux/2.88.9/runtimes/linux-x64/native/libSkiaSharp.so artifacts/
      - name: Validate native artifacts
        run: python3 dwsimpy_package/scripts/validate_native_artifacts.py --platform linux_x86_64 --native-dir artifacts
      - uses: actions/upload-artifact@v4
        with: { name: native-linux-x86_64, path: artifacts/*, retention-days: 14 }
      - name: Build platform wheel
        run: |
          python3 dwsimpy_package/scripts/stage_platform_runtime.py --platform linux_x86_64 --native-dir artifacts --package-dir dwsimpy_package
          cd dwsimpy_package
          CIBW_BUILD=cp310-manylinux_x86_64 python3 -m cibuildwheel --output-dir wheelhouse
          python3 scripts/validate_wheel_contents.py --platform linux_x86_64 wheelhouse/*.whl
      - uses: actions/upload-artifact@v4
        with: { name: wheels-linux-x86_64, path: dwsimpy_package/wheelhouse/*.whl, retention-days: 14 }

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "10.0.x" }
      - name: Install SWIG and Ninja
        run: choco install swig ninja -y --no-progress
      - name: Install Python build tools
        shell: pwsh
        run: python -m pip install --upgrade pip cibuildwheel
      - name: Install CMake 3.28
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-windows-x86_64.zip" -OutFile C:\cmake.zip
          Expand-Archive C:\cmake.zip -DestinationPath C:\
          echo "C:\cmake-3.28.3-windows-x86_64\bin" >> $env:GITHUB_PATH
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build CoolProp
        shell: cmd
        run: |
          cmake --version
          where cl
          git clone --depth 1 https://gitlab.com/libeigen/eigen.git C:\eigen
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git C:\cp
          (echo set^(Csharp_FOUND TRUE^)& echo set^(CSHARP_FOUND TRUE^)& echo set^(CSHARP_COMPILER ""^)) > C:\cp\dev\cmake\Modules\FindCsharp.cmake
          copy /Y C:\cp\dev\cmake\Modules\FindCsharp.cmake C:\cp\cmake\FindCsharp.cmake
          if not exist C:\cp\build mkdir C:\cp\build
          cd /d C:\cp\build
          set CPM_SOURCE_CACHE=C:\cp\.cpm_cache
          cmake -G "Ninja" .. -DCOOLPROP_CSHARP_MODULE=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build . --parallel
          if not exist C:\artifacts mkdir C:\artifacts
          for /r %%F in (CoolPropCsharp.dll CoolProp.dll) do if exist "%%F" if not exist C:\artifacts\CoolProp.dll copy /Y "%%F" C:\artifacts\CoolProp.dll
          if not exist C:\artifacts\CoolProp.dll (
            echo ERROR: CoolProp DLL was not produced.
            dir /s /b *.dll
            exit /b 1
          )
          dir C:\artifacts
      - name: Build PetAz
        shell: cmd
        run: |
          if not exist C:\artifacts mkdir C:\artifacts
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /LD /O2 native_libs_arm64\PetAz.c /Fe:C:\artifacts\PetAz.dll /link /NOLOGO
      - name: Get SkiaSharp
        shell: pwsh
        run: |
          dotnet new classlib -o C:\s --force
          dotnet add C:\s package SkiaSharp.NativeAssets.Win32 --version 2.88.9
          dotnet restore C:\s
          Copy-Item "$env:USERPROFILE\.nuget\packages\skiasharp.nativeassets.win32\2.88.9\runtimes\win-x64\native\libSkiaSharp.dll" "C:\artifacts\"
      - name: Validate native artifacts
        shell: pwsh
        run: python dwsimpy_package\scripts\validate_native_artifacts.py --platform windows_x86_64 --native-dir C:\artifacts
      - uses: actions/upload-artifact@v4
        with: { name: native-windows-x86_64, path: C:\artifacts\*, retention-days: 14 }
      - name: Build platform wheel
        shell: pwsh
        run: |
          python dwsimpy_package\scripts\stage_platform_runtime.py --platform windows_x86_64 --native-dir C:\artifacts --package-dir dwsimpy_package
          Push-Location dwsimpy_package
          $env:CIBW_BUILD = "cp310-win_amd64"
          python -m cibuildwheel --output-dir wheelhouse
          $wheel = (Get-ChildItem wheelhouse\*.whl | Select-Object -First 1).FullName
          python scripts\validate_wheel_contents.py --platform windows_x86_64 $wheel
          Pop-Location
      - uses: actions/upload-artifact@v4
        with: { name: wheels-windows-x86_64, path: dwsimpy_package\wheelhouse\*.whl, retention-days: 14 }

  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "10.0.x" }
      - name: Install deps
        run: HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install cmake swig
      - name: Install Python build tools
        run: python3 -m pip install --upgrade pip cibuildwheel
      - name: Build CoolProp
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          git clone --depth 1 https://github.com/CoolProp/CoolProp.git /tmp/cp
          printf 'set(Csharp_FOUND TRUE)\nset(CSHARP_FOUND TRUE)\nset(CSHARP_COMPILER "")\n' > /tmp/cp/dev/cmake/Modules/FindCsharp.cmake
          cp /tmp/cp/dev/cmake/Modules/FindCsharp.cmake /tmp/cp/cmake/FindCsharp.cmake
          mkdir /tmp/cp/build && cd /tmp/cp/build
          cmake .. -DCOOLPROP_CSHARP_MODULE=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_OSX_ARCHITECTURES=arm64
          make -j$(sysctl -n hw.ncpu)
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp libCoolProp*.dylib $GITHUB_WORKSPACE/artifacts/libCoolProp.dylib 2>/dev/null || cp CoolPropCsharp.dylib $GITHUB_WORKSPACE/artifacts/libCoolProp.dylib
      - name: Build PetAz
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: gcc -shared -dynamiclib -mmacosx-version-min=11.0 -O2 -o artifacts/libPetAz.dylib native_libs_arm64/PetAz.c -lm
      - name: Get SkiaSharp
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          dotnet new classlib -o /tmp/s --force
          dotnet add /tmp/s package SkiaSharp.NativeAssets.macOS --version 2.88.9
          dotnet restore /tmp/s
          lipo ~/.nuget/packages/skiasharp.nativeassets.macos/2.88.9/runtimes/osx/native/libSkiaSharp.dylib -thin arm64 -output artifacts/libSkiaSharp.dylib
      - name: Validate native artifacts
        run: python3 dwsimpy_package/scripts/validate_native_artifacts.py --platform macos_arm64 --native-dir artifacts
      - uses: actions/upload-artifact@v4
        with: { name: native-macos-arm64, path: artifacts/*, retention-days: 14 }
      - name: Build platform wheel
        env:
          CIBW_BUILD: cp310-macosx_arm64
          CIBW_ARCHS_MACOS: arm64
          DWSIMPY_WHEEL_PLAT_NAME: macosx_11_0_arm64
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          python3 dwsimpy_package/scripts/stage_platform_runtime.py --platform macos_arm64 --native-dir artifacts --package-dir dwsimpy_package
          cd dwsimpy_package
          python3 -m cibuildwheel --output-dir wheelhouse
          python3 scripts/validate_wheel_contents.py --platform macos_arm64 wheelhouse/*.whl
      - uses: actions/upload-artifact@v4
        with: { name: wheels-macos-arm64, path: dwsimpy_package/wheelhouse/*.whl, retention-days: 14 }

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-x86_64
      - windows-x86_64
      - macos-arm64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true
      - name: Attach wheels to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          ls -lh wheelhouse
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "dwsimpy wheel release $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" wheelhouse/*.whl --clobber
